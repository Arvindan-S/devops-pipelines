name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project (optional but important)
      - name: Build project
        run: npm run build --if-present

  deploy:
    needs: build   # runs only if build is successful
    runs-on: ubuntu-latest

    steps:
      # 6. Checkout code again
      - name: Checkout code
        uses: actions/checkout@v4

      # 7. Deploy (example: simple echo or replace with real deployment)
      - name: Deploy application
        run: echo "🚀 Deployment successful!"